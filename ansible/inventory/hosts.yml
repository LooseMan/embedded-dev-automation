---
all:
  children:
    old_servers:
      hosts:
        nested_guest_vm_2:
          # `terraform output -raw vm_ipv4_address` の出力値を設定する。
          ansible_host: 192.168.122.96
      vars:
        # Terraform が libvirt 接続に使用する AlmaLinux 10 ホストを踏み台にする。
        # ゲストの旧式 ssh-rsa を許可し、ProxyCommand で NAT 側へ接続する。
        ansible_ssh_common_args: >-
          -o KexAlgorithms=+diffie-hellman-group14-sha1
          -o HostKeyAlgorithms=+ssh-rsa
          -o PubkeyAcceptedAlgorithms=+ssh-rsa
          -o StrictHostKeyChecking=no
          -o ProxyCommand="ssh -W %h:%p -l {{ bastion_ssh_user }} -i {{ bastion_ssh_private_key_path }} {{ bastion_host }}"
